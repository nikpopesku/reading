services:
  web:
    container_name: reading-web
    build: .
    environment:
      DJANGO_ALLOWED_HOSTS: readinglocal.a007.bid,localhost,127.0.0.1
      DJANGO_CSRF_TRUSTED_ORIGINS: https://readinglocal.a007.bid
      DATABASE_URL: postgresql://reading:reading@postgres:5432/reading
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.reading-local.rule=Host(`readinglocal.a007.bid`)"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.reading-local.entrypoints=https"
      - "traefik.http.routers.reading-local.tls=true"
      - "traefik.http.services.reading-local.loadbalancer.server.port=8000"
    networks:
      - default
      - traefik

  postgres:
    container_name: reading-postgres
    image: postgres:17-alpine
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: reading
      POSTGRES_USER: reading
      POSTGRES_PASSWORD: reading
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reading"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  traefik:
    external: true
