name: Deploy Staging

on:
  push:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_TAG: staging-${{ github.sha }}
      STAGING_DB_NAME: reading
      STAGING_DB_USER: reading_user

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          push: true
          tags: |
            ghcr.io/nikpopesku/reading-web:staging
            ghcr.io/nikpopesku/reading-web:${{ env.IMAGE_TAG }}

      - name: Copy stack file to Sirius
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SIRIUS_HOST }}
          username: ${{ secrets.SIRIUS_USER }}
          key: ${{ secrets.SIRIUS_SSH_KEY }}
          source: docker-stack.staging.yml
          target: /home/spacer/reading
          strip_components: 0

      - name: Deploy to Sirius (staging)
        uses: appleboy/ssh-action@v1.2.5
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          STAGING_DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
          DJANGO_SECRET_KEY: ${{ secrets.STAGING_DJANGO_SECRET_KEY }}
          STAGING_DB_NAME: ${{ env.STAGING_DB_NAME }}
          STAGING_DB_USER: ${{ env.STAGING_DB_USER }}
        with:
          host: ${{ secrets.SIRIUS_HOST }}
          username: ${{ secrets.SIRIUS_USER }}
          key: ${{ secrets.SIRIUS_SSH_KEY }}
          envs: IMAGE_TAG,DATABASE_URL,STAGING_DB_PASSWORD,DJANGO_SECRET_KEY,STAGING_DB_NAME,STAGING_DB_USER
          script: |
            set -eu
            mkdir -p /home/spacer/reading

            postgres_uid="$(getent passwd postgres | cut -d: -f3)"
            docker run --rm -i \
              --user "$postgres_uid" \
              -v /var/run/postgresql:/var/run/postgresql \
              postgres:17-alpine \
              psql -h /var/run/postgresql -U postgres -d postgres \
              -v ON_ERROR_STOP=1 \
              -v db_name="$STAGING_DB_NAME" \
              -v db_user="$STAGING_DB_USER" \
              -v db_password="$STAGING_DB_PASSWORD" <<'SQL'
            SELECT format('CREATE ROLE %I LOGIN PASSWORD %L', :'db_user', :'db_password')
            WHERE NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = :'db_user')
            \gexec
            ALTER ROLE :"db_user" WITH PASSWORD :'db_password';
            SELECT format('CREATE DATABASE %I OWNER %I', :'db_name', :'db_user')
            WHERE NOT EXISTS (SELECT 1 FROM pg_database WHERE datname = :'db_name')
            \gexec
            SQL

            if ! docker secret inspect reading_django_secret_key >/dev/null 2>&1; then
              printf '%s' "$DJANGO_SECRET_KEY" | docker secret create reading_django_secret_key -
            fi

            docker pull "ghcr.io/nikpopesku/reading-web:$IMAGE_TAG"
            cd /home/spacer/reading
            IMAGE_TAG="$IMAGE_TAG" DATABASE_URL="$DATABASE_URL" \
              docker stack deploy -c docker-stack.staging.yml reading-staging --with-registry-auth

            web_container=""
            for attempt in $(seq 1 30); do
              for container in $(docker ps -q -f label=com.docker.swarm.service.name=reading-staging_web); do
                container_image="$(docker inspect --format '{{.Config.Image}}' "$container")"
                if [ "${container_image#ghcr.io/nikpopesku/reading-web:$IMAGE_TAG}" != "$container_image" ]; then
                  web_container="$container"
                  break
                fi
              done
              [ -n "$web_container" ] && break
              sleep 2
            done

            if [ -z "${web_container:-}" ]; then
              docker service ps reading-staging_web --no-trunc
              exit 1
            fi

            docker exec "$web_container" python manage.py migrate --noinput
