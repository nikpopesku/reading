{% extends "base.html" %}

{% block title %}{% if object %}Edit{% else %}Add{% endif %} book - Reading{% endblock %}

{% block content %}
<section class="form-panel">
  <h1>{% if object %}Edit book{% else %}Add book{% endif %}</h1>
  <form method="post" class="form-stack">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="button-row">
      <button type="submit" class="primary-button">Save</button>
      <a href="{% url 'book-list' %}">Cancel</a>
    </div>
  </form>
</section>
{% endblock %}
