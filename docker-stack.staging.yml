version: "3.9"

services:
  web:
    image: ghcr.io/nikpopesku/reading-web:${IMAGE_TAG:-staging}
    environment:
      DJANGO_DEBUG: "0"
      DJANGO_ALLOWED_HOSTS: readingstaging.a007.bid
      DJANGO_CSRF_TRUSTED_ORIGINS: https://readingstaging.a007.bid
      DJANGO_SECRET_KEY: /run/secrets/reading_django_secret_key
      DATABASE_URL: ${DATABASE_URL}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    secrets:
      - reading_django_secret_key
    networks:
      - default
      - traefik
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        order: start-first
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik"
        - "traefik.http.services.reading-staging.loadbalancer.server.port=8000"
        - "traefik.http.routers.reading-staging-https.rule=Host(`readingstaging.a007.bid`)"
        - "traefik.http.routers.reading-staging-https.entrypoints=websecure"
        - "traefik.http.routers.reading-staging-https.tls=true"
        - "traefik.http.routers.reading-staging-https.tls.certresolver=myresolver"

networks:
  default:
    driver: overlay
  traefik:
    external: true

secrets:
  reading_django_secret_key:
    external: true
